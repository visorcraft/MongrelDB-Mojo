name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & offline tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python (for urllib interop used by the client)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Mojo is not shipped on GitHub Actions runners and the legacy
      # `repo.prefix.dev/setup/mojo.sh` installer has been removed (it now
      # 404s). The supported path is the `magic` package manager (a pixi fork)
      # or pixi itself pulling Mojo from the public Modular conda channel.
      # That channel is sometimes gated behind network/auth conditions beyond
      # our control, so the install is best-effort: if it succeeds we compile
      # and test for real; if it cannot be obtained the job is skipped
      # gracefully rather than failing.
      - name: Try to install the Mojo toolchain
        id: mojo
        continue-on-error: true
        run: |
          set +e
          # 1) Modern path: the official magic installer.
          curl -fsSL https://magic.modular.com/a2a08ea6-0e30-4c83-b00f-0d58d88b80c9 | bash || true
          # Activate for the rest of *this* step and persist for later steps.
          if [ -f "$HOME/.modular/bin/activate" ]; then
            # shellcheck disable=SC1090
            . "$HOME/.modular/bin/activate"
          fi
          echo "$HOME/.modular/bin" >> "$GITHUB_PATH"
          # 2) Fallback: plain pixi + the public Modular channel.
          if ! command -v mojo >/dev/null 2>&1 && ! command -v magic >/dev/null 2>&1; then
            curl -fsSL https://pixi.sh/install.sh | bash || true
            echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi global install mojo || true
          fi

      - name: Check Mojo availability
        id: check
        run: |
          if command -v mojo >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            mojo --version
          elif command -v magic >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            magic --version
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mojo toolchain could not be installed on this runner; skipping compile/test."
          fi

      - name: Compile client
        if: steps.check.outputs.available == 'true'
        run: mojo build -I src src/mongreldb/__init__.mojo || mojo package -I src src/mongreldb || true

      # Offline unit tests run without a daemon; the live tests self-skip when
      # no server binary is available. The wire-shape suite is pure-offline
      # (including a mock HTTP server for the transport tests) so it runs first
      # as a fast gate.
      - name: Run tests
        if: steps.check.outputs.available == 'true'
        run: |
          mojo test -I src tests/wire_shape_test.mojo
          mojo test -I src tests/live_test.mojo

  live:
    # Boots a real mongreldb-server and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.58.2'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Try to install the Mojo toolchain
        id: mojo
        continue-on-error: true
        run: |
          set +e
          curl -fsSL https://magic.modular.com/a2a08ea6-0e30-4c83-b00f-0d58d88b80c9 | bash || true
          if [ -f "$HOME/.modular/bin/activate" ]; then
            # shellcheck disable=SC1090
            . "$HOME/.modular/bin/activate"
          fi
          echo "$HOME/.modular/bin" >> "$GITHUB_PATH"
          if ! command -v mojo >/dev/null 2>&1 && ! command -v magic >/dev/null 2>&1; then
            curl -fsSL https://pixi.sh/install.sh | bash || true
            echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi global install mojo || true
          fi

      - name: Check Mojo availability
        id: check
        run: |
          if command -v mojo >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            mojo --version
          elif command -v magic >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            magic --version
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mojo toolchain could not be installed on this runner; skipping live tests."
          fi

      - name: Stop early if Mojo unavailable
        if: steps.check.outputs.available == 'false'
        run: echo "Mojo unavailable; nothing to integrate against."

      - name: Cache mongreldb-server binary
        if: steps.check.outputs.available == 'true'
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.check.outputs.available == 'true' && steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        if: steps.check.outputs.available == 'true'
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        if: steps.check.outputs.available == 'true'
        run: mojo test -I src tests/live_test.mojo

      - name: Run examples
        if: steps.check.outputs.available == 'true'
        run: |
          for ex in examples/*.mojo; do
            echo "=== Running $ex ==="
            mojo run -I src "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure() && steps.check.outputs.available == 'true'
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always() && steps.check.outputs.available == 'true'
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
